<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-lg mb-4 sm:mb-8">
        <div class="max-w-7xl mx-auto px-2 sm:px-4">
            <div class="flex justify-between h-14 sm:h-16">
                <div class="flex space-x-4 sm:space-x-7">
                    <a href="/" class="flex items-center">
                        <span class="text-lg sm:text-xl font-bold">← Back to Dashboard</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-2 sm:px-4">
        <h1 class="text-2xl sm:text-3xl font-bold mb-4 sm:mb-8">Add Team Member</h1>
        
        <form id="teamForm" class="bg-white shadow-md rounded px-4 sm:px-8 pt-4 sm:pt-6 pb-6 sm:pb-8 mb-4">
            <div class="grid grid-cols-1 gap-4 sm:gap-6">
                <div class="mb-3 sm:mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="name">
                        Name *
                    </label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                           id="name" type="text" required>
                </div>

                <div class="mb-3 sm:mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="designation">
                        Designation *
                    </label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                           id="designation" type="text" required>
                </div>

                <div class="mb-3 sm:mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="picture">
                        Picture *
                    </label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                           id="picture" type="file" accept="image/*" required>
                </div>

                <div class="mb-3 sm:mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="linkedinUrl">
                        LinkedIn URL *
                    </label>
                    <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                           id="linkedinUrl" type="url" required pattern="https?://.*">
                </div>
            </div>

            <div class="flex items-center justify-end mt-4 sm:mt-6">
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full sm:w-auto" 
                        type="submit">
                    Add Team Member
                </button>
            </div>
        </form>
    </main>

    <script>
        document.getElementById('teamForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            const form = e.target;
            
            formData.append('name', form.name.value);
            formData.append('designation', form.designation.value);
            formData.append('linkedinUrl', form.linkedinUrl.value);
            formData.append('picture', form.picture.files[0]);

            try {
                const response = await fetch('/forms/team', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('Team member added successfully!');
                    form.reset();
                } else {
                    throw new Error('Failed to add team member');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
