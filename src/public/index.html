<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex space-x-7">
                    <div class="flex items-center">
                        <h1 class="text-xl font-bold">Forms Dashboard</h1>
                    </div>
                    <div class="hidden md:flex items-center space-x-4">
                        <a href="/projects.html" class="py-4 px-2 hover:text-blue-500">Projects</a>
                        <a href="/team.html" class="py-4 px-2 hover:text-blue-500">Team</a>
                        <a href="/news.html" class="py-4 px-2 hover:text-blue-500">News</a>
                        <a href="/awards.html" class="py-4 px-2 hover:text-blue-500">Awards</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="px-4 py-6 sm:px-0">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <a href="/projects.html" class="block p-6 bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow">
                    <h2 class="text-xl font-semibold mb-2">Projects</h2>
                    <p class="text-gray-600">Manage project information and details</p>
                </a>
                <a href="/team.html" class="block p-6 bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow">
                    <h2 class="text-xl font-semibold mb-2">Team</h2>
                    <p class="text-gray-600">Manage team members and roles</p>
                </a>
                <a href="/news.html" class="block p-6 bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow">
                    <h2 class="text-xl font-semibold mb-2">News</h2>
                    <p class="text-gray-600">Manage news and articles</p>
                </a>
                <a href="/awards.html" class="block p-6 bg-white rounded-lg shadow-md hover:shadow-lg transition-shadow">
                    <h2 class="text-xl font-semibold mb-2">Awards</h2>
                    <p class="text-gray-600">Manage awards and recognition</p>
                </a>
            </div>
        </div>
    </main>
</body>
</html>
